repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff lint
        entry: uv run ruff check .
        language: system
        types: [python]
        pass_filenames: false

      - id: ruff-format-check
        name: ruff format check
        entry: uv run ruff format --check .
        language: system
        types: [python]
        pass_filenames: false

      - id: tailwind-css
        name: tailwind CSS up to date
        entry: bash scripts/check-css.sh
        language: system
        files: '(\.html|input\.css)$'
        pass_filenames: false
